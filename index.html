        nav ul li a { 
            font-size: 0.9rem; 
            font-weight: 500;
            color: var(--text-dark); 
            transition: color 0.3s;

            margin-bottom: 30px; 
            max-width: 600px; 
            font-weight: 600;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5); /* เพิ่มเงาขาวบางๆ ช่วยให้อ่านง่ายขึ้น */
        }

            font-family: 'Oswald', sans-serif;

            color: var(--white);
            padding: 12px 40px;
            border-radius: 0;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-gold:hover { background-color: var(--primary-gold); transform: translateY(-2px); }

        /* Global Section */
        section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
